<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ページが見つかりません | 株式会社CHIERO</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="/favicon.ico" sizes="32x32">
<style>
:root{--red:#E60012;--ink:#0E0E0E;--sub:#565656;--faint:#8E8E8E;--line:#E5E3DE;
  --g:"Hiragino Sans","Yu Gothic Medium","Noto Sans JP",-apple-system,sans-serif;
  --m:"Hiragino Mincho ProN","Yu Mincho",serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--g);color:var(--ink);background:#fff;line-height:1.9;
  min-height:100vh;display:grid;place-items:center;padding:24px}
.wrap{max-width:520px;text-align:center}
.n{font-family:var(--m);font-size:15px;color:var(--faint);letter-spacing:.3em;margin-bottom:20px}
h1{font-family:var(--m);font-size:clamp(30px,7vw,44px);font-weight:600;line-height:1.4;letter-spacing:.02em}
h1 .r{color:var(--red)}
p{margin-top:26px;font-size:15px;color:var(--sub)}
.links{margin-top:38px;padding-top:26px;border-top:1px solid var(--line);font-size:14px}
.links a{color:var(--red);text-decoration:none;border-bottom:1px solid var(--red);margin:0 10px}
</style>
</head>
<body>
<div class="wrap">
  <p class="n">404</p>
  <h1>このページは、<br><span class="r">流れていません。</span></h1>
  <p>お探しのページは、移動したか、なくなったようです。</p>
  <div class="links">
    <a href="/">トップへ</a>
    <a href="https://chiero.jp/">会社について</a>
  </div>
</div>

</body>
</html>
